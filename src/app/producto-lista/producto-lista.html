<div class="container">

    <div class="container text-center" style="margin: 30px;">
        <h3>Sistema de inventarios</h3>
    </div>

    <table class="table table-stripe table-hover align-middle">
        <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Nombre</th>
                <th scope="col">Descripcion</th>
                <th scope="col">Precio</th>
                <th scope="col">En existencia</th>
                <th scope="col" class="text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            @for(producto of productos;track producto.idProducto){
            <tr>
                <th scope="row">{{producto.idProducto}}</th>    
                <th>{{producto.nombre}}</th>
                <th>{{producto.descripcion}}</th>
                <th>{{producto.precio}}</th>
                <th>{{producto.existencia}}</th>
                <th class="text-center">
                    <div (click)="editarProducto(producto.idProducto)" class="btn btn-warning btn-sm me-3">Editar</div>
                    <div (click)="eliminarProducto(producto.idProducto)" class="btn btn-danger btn-sm">Eliminar</div>
                </th>
            </tr>
            }
        </tbody>
    </table>

</div>
