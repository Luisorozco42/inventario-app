<div class="container">
    <div class="container text-center" style="margin: 30px;">
        <h3>Editar Producto</h3>
    </div>
    <form (ngSubmit)="onSubmit()">
        <div class="mb3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingrese el nombre del producto"
            [(ngModel)]="producto.nombre">
        </div>
        <div class="mb3">
            <label for="descripcion" class="form-label">Descripcion</label>
            <input type="text" class="form-control" id="descripcion" name="descripcion" placeholder="Ingrese la descripcion del producto"
            [(ngModel)]="producto.descripcion">
        </div>
        <div class="mb3">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" class="form-control" step="any" id="precio" name="precio"
                placeholder="Ingrese el precio del producto"
                [(ngModel)]="producto.precio">
        </div>
        <div class="mb3">
            <label for="existencia" class="form-label">Existencia</label>
            <input type="number" class="form-control" id="existencia" name="existencia" placeholder="Ingrese la existencia del producto"
                [(ngModel)]="producto.existencia">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-warning btn-sm m-3">Guardar cambios</button>
            <a href="productos" class="btn btn-danger btn-sm">Regresar</a>
        </div>
    </form>

</div>
